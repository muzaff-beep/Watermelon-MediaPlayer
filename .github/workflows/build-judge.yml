name: Watermelon Build Judge

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:

  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build & unit tests
        run: ./gradlew build test --continue

      - name: Rename APK
        if: always()
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/WatermelonPlayer_Debug.apk

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WatermelonPlayer_Debug
          path: app/build/outputs/apk/debug/WatermelonPlayer_Debug.apk
          if-no-files-found: warn

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: '**/build/reports/lint-results-debug.html'
          if-no-files-found: warn

  interface-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify interface consistency
        run: python3 scripts/verify_interfaces.py

  migration-ladder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run migration tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          script: ./gradlew :library-storage:connectedCheck -Pandroid.testInstrumentationRunnerArguments.class=com.watermelon.storage.db.MigrationTest
          
